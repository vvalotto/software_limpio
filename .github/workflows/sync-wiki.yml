name: Sync Docs to Wiki

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "!docs/curso/**"
  workflow_dispatch:

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Clonar wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git" wiki

      - name: Sincronizar docs → wiki
        env:
          GITHUB_REPO: ${{ github.repository }}
        run: python .github/scripts/sync_wiki.py

      - name: Publicar cambios en wiki
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet \
            && echo "Sin cambios en la wiki." \
            || git commit -m "docs: sync desde main@$(echo '${{ github.sha }}' | cut -c1-7)" \
            && git push
